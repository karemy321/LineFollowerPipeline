<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Follow the line — block design</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: "Segoe UI", Roboto, -apple-system, Arial, sans-serif;
    background: #F4F4F6;
    background-image: radial-gradient(circle, #D8D8DE 1.2px, transparent 1.2px);
    background-size: 22px 22px;
    color: #2b2b2b;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }

  .caption {
    font-size: 13px;
    color: #8a8a92;
    margin: 0 0 14px 0;
    font-weight: 600;
    letter-spacing: .3px;
  }
  .caption.strong { color: #C06810; }

  .spacer { height: 34px; }

  /* ---------- generic block chassis ---------- */
  .block {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: #F08A28;
    border: 1px solid #C06810;
    border-radius: 8px;
    padding: 11px 16px 11px 15px;
    font-size: 14.5px;
    font-weight: 600;
    color: #4A1B0C;
    white-space: nowrap;
    box-shadow: 0 1px 0 rgba(0,0,0,.12);
  }

  /* the notch on top + the bump underneath */
  .block::before, .block::after {
    content: "";
    position: absolute;
    left: 26px;
    width: 20px;
    height: 6px;
    background: #F08A28;
    border: 1px solid #C06810;
  }
  .block::before {
    top: -1px;
    border-top: none;
    border-radius: 0 0 6px 6px;
    box-shadow: inset 0 -2px 2px rgba(0,0,0,.09);
    background: #E07A1C;
  }
  .block::after {
    bottom: -7px;
    border-top: none;
    border-radius: 0 0 6px 6px;
  }

  /* ---------- robot icon ---------- */
  .icon {
    width: 26px; height: 22px;
    border-radius: 4px;
    background: #E24B4A;
    border: 1px solid #A32D2D;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: none;
  }
  .icon svg { display: block; }

  /* ---------- dropdown pill (the "on" chip) ---------- */
  .dropdown {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #F5A94E;
    border: 1px solid #C06810;
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 13.5px;
    color: #4A1B0C;
  }
  .caret {
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid #4A1B0C;
  }

  /* ---------- the socket (rounded well a value plugs into) ---------- */
  .socket {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #E07A1C;
    border: 1px solid #C06810;
    border-radius: 999px;
    padding: 4px 10px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.18);
  }

  /* a variable plugged into a socket */
  .var {
    background: #85B7EB;
    border: 1px solid #185FA5;
    border-radius: 999px;
    padding: 2px 11px;
    font-size: 13px;
    color: #042C53;
    font-weight: 600;
  }

  /* a plain number the student types */
  .num {
    background: #ffffff;
    border: 1px solid #C06810;
    border-radius: 999px;
    padding: 2px 16px;
    font-size: 13.5px;
    color: #4A1B0C;
    font-weight: 700;
    min-width: 52px;
    text-align: center;
  }

  .times { font-size: 13px; color: #4A1B0C; padding: 0 1px; }
  .lbl   { font-weight: 600; }

  /* ---------- the strike-through callout ---------- */
  .gone {
    position: relative;
    opacity: .45;
  }
  .gone::after {
    content: "";
    position: absolute;
    left: -4px; right: -4px;
    top: 50%;
    height: 2.5px;
    background: #A32D2D;
    border-radius: 2px;
    transform: rotate(-2deg);
  }

  .note {
    margin: 26px 0 0 0;
    font-size: 13px;
    color: #6b6b73;
    line-height: 1.7;
    max-width: 420px;
  }
  .note b { color: #C06810; }
</style>
</head>
<body>

<p class="caption strong">follow the line</p>

<div class="block">
  <span class="icon">
    <svg width="15" height="13" viewBox="0 0 15 13">
      <rect x="2" y="3" width="11" height="8" rx="1.5" fill="#fff"/>
      <circle cx="5" cy="7" r="1.3" fill="#E24B4A"/>
      <circle cx="10" cy="7" r="1.3" fill="#E24B4A"/>
      <rect x="6.2" y="0.5" width="2.6" height="3" rx="1" fill="#fff"/>
    </svg>
  </span>
  <span class="lbl">follow the line</span>
  <span class="dropdown">on <i class="caret"></i></span>
  <span class="lbl">power</span>
  <span class="socket">
    <span class="num">50</span>
  </span>
</div>

<p class="note">
  <b>Power</b> is the only input. Steering is automatic, and the robot
  still slows itself into curves.
</p>

</body>
</html>
